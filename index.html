#login-page::after{content:'';position:absolute;bottom:0;left:0;right:0;height:38%;background:radial-gradient(ellipse 50% 60% at 50% 50%,rgba(255,100,30,.22) 0%,rgba(200,60,255,.08) 50%,transparent 80%);pointer-events:none;z-index:0;}
#login-page::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 55% at 50% 50%,rgba(0,0,0,.05) 0%,rgba(5,10,50,.38) 60%,rgba(3,7,35,.60) 100%);pointer-events:none;}
.stars{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.star{position:absolute;border-radius:50%;animation:twinkle 3s infinite;}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(1);}50%{opacity:.9;transform:scale(1.8);}}
.login-card{position:relative;background:rgba(4,12,38,.22);padding:clamp(14px,3vw,26px) clamp(18px,5vw,36px);border-radius:28px;text-align:center;width:min(340px,88vw);backdrop-filter:blur(36px) saturate(180%);-webkit-backdrop-filter:blur(36px) saturate(180%);border:1px solid rgba(100,160,255,.32);box-shadow:0 0 0 1px rgba(255,255,255,.07),0 24px 80px rgba(0,0,0,.70),0 0 60px rgba(80,130,255,.15);}
.app-title{color:#fb923c;font-size:clamp(20px,5vw,26px);font-weight:900;margin-bottom:4px;letter-spacing:1px;text-shadow:0 0 18px rgba(249,115,22,.7);}
.app-sub{color:rgba(186,210,255,.75);font-size:13px;margin-bottom:14px;}
/* ── Pro Clock ── */
.pro-clock-wrap{margin:0 auto 14px;display:flex;flex-direction:column;align-items:center;gap:6px;}
.clock-ring-svg{width:clamp(120px,30vw,150px);height:clamp(120px,30vw,150px);filter:drop-shadow(0 0 18px rgba(249,115,22,.45));}
.clock-ring-bg{fill:rgba(4,12,38,.55);stroke:rgba(255,255,255,.08);stroke-width:1;}
.clock-ring-sec{fill:none;stroke:url(#secGrad);stroke-width:6;stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset .4s cubic-bezier(.4,2,.6,1);}
.clock-ring-min{fill:none;stroke:rgba(99,179,255,.5);stroke-width:3;stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%;}
.clock-digital{font-size:clamp(26px,7vw,34px);font-weight:900;fill:#fff;letter-spacing:2px;text-shadow:0 0 20px rgba(249,115,22,.8);font-family:"Segoe UI",Cairo,monospace;}
.clock-ampm{font-size:13px;fill:rgba(186,210,255,.8);font-family:"Segoe UI",Cairo,sans-serif;}
.clock-date-greg{font-size:clamp(11px,2.8vw,13px);color:rgba(186,210,255,.9);margin-top:2px;letter-spacing:.5px;text-shadow:0 1px 6px rgba(0,0,0,.5);}
.clock-date-hijri{font-size:clamp(11px,2.8vw,13px);color:rgba(251,146,60,.9);letter-spacing:.5px;text-shadow:0 1px 6px rgba(0,0,0,.5);}
.profile-ring{width:clamp(72px,17vw,88px);height:clamp(72px,17vw,88px);border-radius:50%;background:linear-gradient(135deg,#fb923c,#ea580c,#fb923c);padding:3px;margin:0 auto 12px;box-shadow:0 0 30px rgba(249,115,22,.5),0 0 70px rgba(249,115,22,.18);animation:pulse-gold 2.5s ease-in-out infinite;}

.header-avatar{width:36px;height:36px;border-radius:50%;border:2px solid #fb923c;object-fit:cover;object-position:center top;flex-shrink:0;}
#welcome-lottie{width:100%;max-width:300px;height:80px;margin:0 auto 10px;display:block;}
#passInput{width:100%;padding:13px;border-radius:12px;border:1.5px solid rgba(251,146,60,.35);background:rgba(255,255,255,.08);color:#fff;text-align:center;font-size:18px;outline:none;letter-spacing:4px;}
#passInput::placeholder{color:rgba(255,255,255,.35);letter-spacing:1px;}
#passInput:focus{border-color:#fb923c;box-shadow:0 0 0 3px rgba(249,115,22,.22);background:rgba(255,255,255,.12);}
.btn-login{width:100%;margin-top:14px;padding:14px;background:linear-gradient(135deg,#f97316,#ea580c,#c2410c);color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:900;cursor:pointer;transition:all .25s;letter-spacing:.5px;box-shadow:0 4px 20px rgba(249,115,22,.35);}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(249,115,22,.55);}
.btn-login:active{transform:translateY(0);}
/* MAIN APP */
#main-app{display:none;}
.app-header{background:var(--header-bg);color:var(--header-text);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:1100;box-shadow:0 2px 20px rgba(0,0,0,.3);}
.header-title{font-size:clamp(16px,4vw,22px);font-weight:900;color:#fbbf24;white-space:nowrap;}
.header-btns{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.hbtn{padding:7px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:white;cursor:pointer;font-size:13px;font-weight:700;transition:all .2s;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:4px;}
.hbtn:hover{background:rgba(255,255,255,.2);}
.hbtn.active{background:#f59e0b;color:#000;border-color:#f59e0b;}
.hbtn.mode-active{background:rgba(255,255,255,.3);border-color:#fbbf24;color:#fbbf24;}
.app-body{padding:clamp(8px,2vw,20px);max-width:1400px;margin:auto;}
/* GRAND PANEL (shown at top when toggled) */
.grand-section{background:var(--grand-bg);border-radius:var(--radius);padding:20px;margin-bottom:14px;border:2px solid var(--accent);display:none;}
.grand-section.show{display:block;}
.grand-title{text-align:center;font-size:18px;font-weight:900;color:var(--accent);margin-bottom:16px;border-bottom:2px solid var(--border);padding-bottom:10px;}
.grand-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;}
.grand-box{text-align:center;}
.grand-box label{display:block;font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:6px;}
.grand-box .grand-val{width:100%;padding:12px;text-align:center;font-weight:900;font-size:clamp(18px,3vw,22px);border:2px solid var(--border);border-radius:8px;background:var(--surface);color:var(--danger);display:block;}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:14px;}
.stat-card{background:var(--stat-bg);border-radius:var(--radius);padding:16px;text-align:center;border:1px solid var(--border);}
.stat-num{font-size:clamp(22px,4vw,32px);font-weight:900;color:var(--primary);}
[data-theme="dark"] .stat-num{color:var(--accent);}
.stat-label{font-size:12px;color:var(--text-muted);font-weight:700;margin-top:4px;}
/* SEARCH */
.search-section{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:14px;border:1px solid var(--border);box-shadow:var(--shadow);}
.search-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.search-row input{flex:1;min-width:120px;padding:10px 14px;border-radius:8px;border:2px solid var(--border);background:var(--input-bg);color:var(--text);font-size:14px;font-weight:600;outline:none;}
.search-row input:focus{border-color:var(--primary);}
.archive-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
.arch-item{display:flex;align-items:center;gap:6px;background:var(--primary);color:white;padding:7px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;border:1px solid transparent;transition:all .2s;}
.arch-item:hover{background:var(--primary-light);transform:translateY(-1px);}
.arch-item .arch-date{font-size:10px;color:rgba(255,255,255,.6);display:block;}
.arch-del{background:rgba(255,255,255,.2);border:none;color:white;width:18px;height:18px;border-radius:50%;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s;}
.arch-del:hover{background:rgba(220,38,38,.8);}
/* ENTRY FORM */
.entry-section{background:var(--surface);border-radius:var(--radius);padding:20px 16px 14px;margin-bottom:14px;border:1px solid var(--border);box-shadow:var(--shadow);}
.entry-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:14px;margin-bottom:12px;}
.field{position:relative;}
.field label{position:absolute;top:-10px;right:10px;background:var(--surface);padding:0 6px;font-size:12px;font-weight:700;color:var(--primary);white-space:nowrap;}
.field input{width:100%;padding:12px 8px;border-radius:8px;border:2px solid var(--border);background:var(--input-bg);color:var(--text);text-align:center;font-size:16px;font-weight:900;outline:none;transition:border-color .2s;}
.field input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(30,64,175,.15);}
.field input[readonly]{background:var(--surface2);color:var(--text-muted);cursor:default;}
.entry-btns{display:flex;gap:8px;flex-wrap:wrap;}
/* BUTTONS */
.btn{padding:10px 16px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:900;transition:all .2s;white-space:nowrap;color:white;}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn-green{background:linear-gradient(135deg,#16a34a,#15803d);}
.btn-blue{background:linear-gradient(135deg,#1d4ed8,#1e40af);}
.btn-red{background:linear-gradient(135deg,#dc2626,#b91c1c);}
.btn-orange{background:linear-gradient(135deg,#ea580c,#c2410c);}
.btn-teal{background:linear-gradient(135deg,#0d9488,#0f766e);}
.btn-purple{background:linear-gradient(135deg,#7c3aed,#6d28d9);}
.btn-yellow{background:linear-gradient(135deg,#d97706,#b45309);color:#fff;}
.btn-gray{background:linear-gradient(135deg,#475569,#334155);}
.btn-indigo{background:linear-gradient(135deg,#4f46e5,#3730a3);}
.btn-sm{padding:6px 10px;font-size:12px;}
/* VIEW MODES TOOLBAR */
.view-mode-bar{background:var(--surface);border-radius:var(--radius);padding:10px 14px;margin-bottom:14px;border:1px solid var(--border);box-shadow:var(--shadow);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.view-mode-bar span{font-size:13px;font-weight:700;color:var(--text-muted);white-space:nowrap;}
.mode-btn{padding:8px 14px;border-radius:8px;border:2px solid var(--border);background:var(--surface2);color:var(--text-muted);cursor:pointer;font-size:13px;font-weight:700;transition:all .2s;}
.mode-btn:hover{border-color:var(--primary);color:var(--primary);}
.mode-btn.active{background:var(--primary);color:white;border-color:var(--primary);}
/* FOCUS MODE NAV BAR */
.focus-nav{display:none;position:sticky;top:64px;z-index:1000;background:var(--header-bg);padding:8px 14px;overflow-x:auto;white-space:nowrap;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.focus-nav.show{display:block;}
.focus-nav-inner{display:inline-flex;gap:6px;}
.focus-tab{padding:6px 14px;border-radius:20px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);cursor:pointer;font-size:12px;font-weight:700;transition:all .2s;white-space:nowrap;}
.focus-tab:hover{background:rgba(255,255,255,.2);color:white;}
.focus-tab.active{background:#f59e0b;color:#000;border-color:#f59e0b;}
/* TABLE SEPARATOR */
.table-separator{height:3px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:20px 0;border-radius:2px;}
/* TABLE SECTION */
.table-section{background:var(--surface);border-radius:var(--radius);margin-bottom:0;border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;transition:all .3s;}
.table-section.focus-hidden{display:none;}
.table-header-bar{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;border-bottom:3px solid var(--accent);background:linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%);}
.table-name-title{font-size:17px;font-weight:900;color:white;display:flex;align-items:center;gap:8px;}
.table-num-badge{background:rgba(255,255,255,.2);color:white;padding:3px 10px;border-radius:20px;font-size:13px;font-weight:900;}
.table-toolbar{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;border-bottom:1px solid var(--border);background:var(--surface2);}
.table-title{font-size:15px;font-weight:900;color:var(--text);}
.table-filter{padding:8px 12px;border-radius:8px;border:2px solid var(--border);background:var(--input-bg);color:var(--text);font-size:13px;outline:none;width:min(200px,100%);}
.table-filter:focus{border-color:var(--primary);}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;min-width:580px;}
th{background:var(--th-bg);color:var(--text);padding:clamp(8px,1.5vw,14px) clamp(4px,1vw,8px);font-size:clamp(13px,1.8vw,16px);font-weight:900;border-bottom:2px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:10;}
td{padding:clamp(8px,1.5vw,12px) clamp(4px,1vw,8px);text-align:center;font-size:clamp(14px,1.8vw,16px);font-weight:700;border-bottom:1px solid var(--border);color:var(--text);}
tbody tr:hover{background:var(--hover-row)!important;}
tbody tr.marked{background:var(--mark-bg)!important;}
.num-cell{background:var(--surface2);color:var(--text-muted);font-size:13px;font-weight:900;}
.cell-edit{outline:none;min-width:40px;}
.row-actions{display:flex;gap:4px;justify-content:center;}
.row-btn{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:6px;font-size:14px;transition:background .2s;}
.row-btn:hover{background:var(--surface2);}
.total-row td{background:var(--total-bg)!important;color:var(--total-text)!important;font-size:clamp(14px,2vw,17px);font-weight:900;border-top:3px solid var(--accent);}
.hidden-row{display:none;}
/* REVIEW MODE */
body.mode-review tbody tr:nth-child(odd){background:var(--review-odd)!important;}
body.mode-review tbody tr:nth-child(even){background:var(--review-even)!important;}
body.mode-review td{border-bottom:2px solid var(--review-border)!important;border-left:1px solid var(--review-border);}
body.mode-review th{border-bottom:3px solid var(--review-border)!important;border-left:1px solid var(--review-border);}
body.mode-review tbody tr{border-right:4px solid var(--review-border);}
body.mode-review tbody tr:hover{opacity:.85;}
body.mode-review .num-cell{background:var(--review-border);color:white;font-weight:900;}
/* FOCUS MODE - full viewport table */
body.mode-focus .table-section{min-height:calc(100vh - 130px);}
/* ADD TABLE SECTION */
.add-table-section{text-align:center;padding:30px 16px;margin:20px 0;}
/* ACTION BAR */
.action-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;justify-content:center;}
/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:10000;justify-content:center;align-items:center;backdrop-filter:blur(4px);}
.modal-overlay.show{display:flex;}
.modal{background:var(--modal-bg);padding:30px;border-radius:20px;text-align:center;width:min(400px,92vw);max-height:90vh;overflow-y:auto;border:2px solid var(--primary);box-shadow:0 20px 60px rgba(0,0,0,.4);animation:slideUp .25s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.modal h3{margin-bottom:18px;color:var(--primary);font-size:18px;font-weight:900;}
.modal-btns{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
.modal-input{width:100%;padding:12px;border-radius:10px;border:2px solid var(--border);background:var(--input-bg);color:var(--text);font-size:15px;font-weight:700;outline:none;text-align:center;margin-bottom:10px;}
.modal-input:focus{border-color:var(--primary);}
.badge{display:inline-block;background:var(--danger);color:white;font-size:10px;font-weight:900;padding:1px 6px;border-radius:20px;margin-right:4px;vertical-align:middle;}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:white;padding:12px 24px;border-radius:30px;font-weight:700;z-index:20000;opacity:0;transition:opacity .3s;box-shadow:0 8px 24px rgba(0,0,0,.3);pointer-events:none;white-space:nowrap;border:1px solid rgba(255,255,255,.1);}
#toast.show{opacity:1;}
.divider{border:none;border-top:1px solid var(--border);margin:12px 0;}
@media print{
  body{background:white!important;color:black!important;}
  .no-print{display:none!important;}
  .app-header{display:none!important;}
  .focus-nav{display:none!important;}
  .view-mode-bar{display:none!important;}
  .table-section{box-shadow:none!important;border:2px solid #000!important;page-break-inside:avoid;}
  .table-separator{display:none!important;}
  table{min-width:unset!important;}
  th{background:#e2e8f0!important;color:#000!important;}
  td{color:#000!important;}
  .total-row td{background:#1e293b!important;color:#fbbf24!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .print-header{display:block!important;}
  body.mode-focus .table-section.focus-hidden{display:block!important;}
}
.print-header{display:none;text-align:center;margin-bottom:20px;border-bottom:3px solid #1e40af;padding-bottom:15px;}
.print-header h1{font-size:24px;color:#1e40af;font-weight:900;}
.print-header p{font-size:14px;color:#475569;}
@media(max-width:640px){.header-btns .hbtn span{display:none;}.hbtn{padding:7px 9px;}.entry-grid{grid-template-columns:repeat(3,1fr);}.action-bar .btn span{display:none;}.action-bar .btn{padding:10px;}}
@media(max-width:400px){.entry-grid{grid-template-columns:repeat(2,1fr);}}
</style>

<!-- LOGIN PAGE -->

    <div class="pro-clock-wrap">
      <svg class="clock-ring-svg" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="secGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#fb923c"/>
            <stop offset="100%" stop-color="#f97316"/>
          </linearGradient>
          <filter id="glow">

        <!-- second ring (thick, orange glow) -->
        <circle class="clock-ring-sec" id="ring-sec" cx="90" cy="90" r="83"
                stroke-dasharray="521.5" stroke-dashoffset="521.5" filter="url(#glow)"/>

        <text class="clock-digital" id="clk-hm" x="90" y="88" text-anchor="middle" dominant-baseline="middle"></text>

function initTablesData(){
  const saved=load(STORE_TABLES);
  if(saved&&Array.isArray(saved)&&saved.length>0){
    // Migrate old data if needed
    tablesData=saved.map((t,i)=>({
      name:t.name||('تصاريح العمل جدول رقم '+(i+1)),
      rows:Array.isArray(t.rows)?t.rows:newTableRows()
    }));
  } else {
    // Check for old single-table data
    const oldRows=load('cs_rows_v1');
    tablesData=[];
    for(let i=0;i<INIT_TABLES;i++){
      const t=newTable(i+1);
      if(i===0&&oldRows&&Array.isArray(oldRows)){
        t.rows=oldRows.map(r=>r||newRow());
        while(t.rows.length<ROWS_PER_TABLE) t.rows.push(newRow());
        t.rows=t.rows.slice(0,ROWS_PER_TABLE);
      }
      tablesData.push(t);
    }
  }
}

function genStars(){
  const c=document.getElementById('stars');

    s.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;'

// ── Pro Clock ─────────────────────────────────────────────────────────────
function getHijriDate(date){
  try{
    const h=new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura',{day:'numeric',month:'long',year:'numeric'}).format(date);
    return '🌙 '+h+' هـ';
  }catch(e){return '';}
}
function getGregDate(date){
  return new Intl.DateTimeFormat('ar-EG',{weekday:'long',day:'numeric',month:'long',year:'numeric'}).format(date);
}
function updateClock(){
  const n=new Date(),pad=x=>String(x).padStart(2,'0');
  const hrs=n.getHours(),min=n.getMinutes(),sec=n.getSeconds();

  // digital
  const hmEl=document.getElementById('clk-hm');
  const ssEl=document.getElementById('clk-ss');
  if(hmEl) hmEl.textContent=pad(hrs)+':'+pad(min);
  if(ssEl) ssEl.textContent=pad(sec)+'  '+(hrs>=12?'م':'ص');

  // second ring  circumference = 2π×83 ≈ 521.5
  const secRing=document.getElementById('ring-sec');
  if(secRing){
    const secFrac=sec/60;
    secRing.style.strokeDashoffset=521.5*(1-secFrac);
  }
  // minute ring  circumference = 2π×78 ≈ 490.09
  const minRing=document.getElementById('ring-min');
  if(minRing){
    const minFrac=(min*60+sec)/3600;
    minRing.style.strokeDashoffset=490.09*(1-minFrac);
  }

  // dates (refresh every minute)
  if(sec===0||!document.getElementById('clk-date-greg').textContent){
    const gregEl=document.getElementById('clk-date-greg');
    const hijEl=document.getElementById('clk-date-hijri');
    if(gregEl) gregEl.textContent='📅 '+getGregDate(n)+' م';
    if(hijEl)  hijEl.textContent=getHijriDate(n);
  }
}

function autoCalc(v){
  if(!v){['f_a','f_s','f_p','f_old','f_dis'].forEach(id=>document.getElementById(id).value='');return;}
  const n=parseFloat(v)||0;
  const m=getMultipliers();

  document.getElementById('f_s').value=n*m.mult_s;
  document.getElementById('f_p').value=n*m.mult_p;
  document.getElementById('f_old').value=n*m.mult_old;
  document.getElementById('f_dis').value=n*m.mult_dis;

function drawAll(){

  });

    <div class="table-section" id="table-section-${tIdx}">
      <div class="table-header-bar">
        <div class="table-name-title">
          📋 ${t.name}
          <span class="table-num-badge">صفوف ${startRow}–${endRow}</span>
          <span class="table-num-badge" style="background:rgba(255,255,255,.3);">مملوء: ${filled}/${ROWS_PER_TABLE}</span>
        </div>
        <div class="no-print" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
          <input class="table-filter" type="text" id="filter-${tIdx}" placeholder="🔍 فلتر..." oninput="filterSingleTable(${tIdx})" style="width:150px;"/>
          <button onclick="deleteTable(${tIdx})" style="padding:6px 12px;border-radius:8px;border:none;background:rgba(220,38,38,.85);color:white;cursor:pointer;font-size:13px;font-weight:900;transition:all .2s;" title="حذف هذا الجدول">🗑️ حذف الجدول</button>
        </div>
      </div>
      <div class="table-wrap">
        <table id="maintable-${tIdx}">
          <thead>
            <tr>
              <th style="width:50px">م</th>
              <th>عدد الحركات</th>
              <th>أمانات</th>
              <th>ط.شهيد</th>
              <th>ط.شرطة</th>
              <th>مسنين</th>
              <th>إعاقة</th>
              <th>ميكنة</th>
              <th class="no-print" style="width:60px">خيارات</th>
            </tr>
          </thead>
          <tbody id="tbody-${tIdx}">${rowsHtml}</tbody>
          <tfoot>
            <tr class="total-row">
              <td colspan="2">إجمالي ${t.name}</td>
              <td>${totals.a}</td><td>${totals.s}</td><td>${totals.p}</td>

function filterSingleTable(tIdx){
  const filter=(document.getElementById('filter-'+tIdx)||{}).value||'';
  const tbody=document.getElementById('tbody-'+tIdx);
  if(!tbody) return;
  const rows=tbody.querySelectorAll('tr');
  rows.forEach(tr=>{
    if(!filter){tr.classList.remove('hidden-row');return;}
    const text=tr.textContent;
    if(text.includes(filter)) tr.classList.remove('hidden-row');
    else tr.classList.add('hidden-row');
  });
}

function updateCell(tIdx,rowIdx,field,val){
  tablesData[tIdx].rows[rowIdx][field]=field==='count'?val:Number(val)||0;
  saveTablesData();
  drawTable(tIdx);
}

// ============================
// VIEW MODES
// ============================
function setMode(mode){
  currentMode=mode;
  localStorage.setItem(STORE_MODE,mode);
  applyMode(mode,true);
}
function applyMode(mode,toast=true){
  // Remove all mode classes from body
  document.body.classList.remove('mode-scroll','mode-focus','mode-review');
  document.body.classList.add('mode-'+mode);
  // Update buttons
  ['scroll','focus','review'].forEach(m=>{
    const btn=document.getElementById('mode'+capitalize(m)+'Btn');
    if(btn) btn.classList.toggle('active',m===mode);
  });
  // Focus nav
  const focusNav=document.getElementById('focusNav');
  if(mode==='focus'){
    focusNav.classList.add('show');
    showFocusTable(focusTableIdx);
  } else {
    focusNav.classList.remove('show');
    // Show all tables
    tablesData.forEach((_,i)=>{
      const sec=document.getElementById('table-section-'+i);
      if(sec) sec.classList.remove('focus-hidden');
    });
    // Show all separators
    const seps=document.querySelectorAll('.table-separator');
    seps.forEach(s=>s.style.display='');
  }
  if(toast){
    const labels={scroll:'📜 وضع السكرول',focus:'🔍 وضع التركيز',review:'👁️ وضع المراجعة'};
    showToast(labels[mode]||mode);
  }
}
function capitalize(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function showFocusTable(idx){
  focusTableIdx=idx;
  tablesData.forEach((_,i)=>{
    const sec=document.getElementById('table-section-'+i);
    const sep=document.getElementById('table-separator-'+i);
    if(sec){
      if(i===idx) sec.classList.remove('focus-hidden');
      else sec.classList.add('focus-hidden');
    }
  });
  // Hide separators in focus mode
  const seps=document.querySelectorAll('.table-separator');
  seps.forEach(s=>s.style.display='none');
  // Update nav tabs
  const tabs=document.querySelectorAll('.focus-tab');
  tabs.forEach((tab,i)=>tab.classList.toggle('active',i===idx));
  // Scroll to top
  window.scrollTo({top:document.querySelector('.view-mode-bar')?.offsetTop||0,behavior:'smooth'});
}
function updateFocusNav(){
  const inner=document.getElementById('focusNavInner');
  if(!inner) return;
  inner.innerHTML='';
  tablesData.forEach((t,i)=>{
    const btn=document.createElement('button');
    btn.className='focus-tab'+(i===focusTableIdx?' active':'');
    btn.textContent='جدول '+(i+1);
    btn.onclick=()=>showFocusTable(i);
    inner.appendChild(btn);
  });
}

function getAllRows(){

function saveToArchive(){

  archive[n]={

    date:new Date().toLocaleDateString('ar-EG'),

    const d=document.createElement('div');d.className='arch-item';
    d.innerHTML='<span>📁 '+k+'<span class="arch-date">'+date+' '+time+'</span></span><button class="arch-del" title="حذف" onclick="event.stopPropagation();quickDelete(\''+k+'\')">✕</button>';

function toggleGrand(){
  showGrand=!showGrand;
  const section=document.getElementById('grandSection');
  section.classList.toggle('show',showGrand);
  const btn=document.getElementById('grandBtn');
  btn.classList.toggle('active',showGrand);
  if(showGrand){
    updateGrand();

  }
  showToast(showGrand?'🗂️ تم عرض الإجمالي':'تم إخفاء الإجمالي');
}
function updateGrand(){
  const g={a:0,s:0,p:0,old:0,dis:0,m:0};
  Object.values(archive).forEach(item=>{
    const rows=item.tables?item.tables.flatMap(t=>t.rows):(item.rows||item);
    rows.forEach(r=>{g.a+=+(r.a||0);g.s+=+(r.s||0);g.p+=+(r.p||0);g.old+=+(r.old||0);g.dis+=+(r.dis||0);g.m+=+(r.m||0);});
  });
  for(const k in g){const el=document.getElementById('grand_'+k);if(el)el.textContent=g[k];}
}

function updateStats(){

  const allRows=getAllRows();
  const filled=allRows.filter(r=>r.count!==''&&r.count!=null).length;
  const totA=allRows.reduce((s,r)=>s+(+r.a||0),0);
  const totS=allRows.reduce((s,r)=>s+(+r.s||0),0);
  const totP=allRows.reduce((s,r)=>s+(+r.p||0),0);

    <div class="stat-card"><div class="stat-num">${totP}</div><div class="stat-label">إجمالي ط.شرطة</div></div>`;
}

  tablesData.forEach((t,tIdx)=>{
    const cols=['م','عدد الحركات','أمانات','ط.شهيد','ط.شرطة','مسنين','إعاقة','ميكنة'];
    const data=[['الجدول: '+t.name],[],cols];
    t.rows.forEach((r,i)=>{if(r.count!==''&&r.count!=null) data.push([tIdx*ROWS_PER_TABLE+i+1,r.count,r.a,r.s,r.p,r.old,r.dis,r.m]);});
    const tot=t.rows.reduce((a,c)=>({a:a.a+(+c.a||0),s:a.s+(+c.s||0),p:a.p+(+c.p||0),old:a.old+(+c.old||0),dis:a.dis+(+c.dis||0),m:a.m+(+c.m||0)}),{a:0,s:0,p:0,old:0,dis:0,m:0});
    data.push(['الإجمالي','',tot.a,tot.s,tot.p,tot.old,tot.dis,tot.m]);
    const ws=XLSX.utils.aoa_to_sheet(data);
    ws['!cols']=[{wch:5},{wch:15},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10}];
    ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:7}}];
    XLSX.utils.book_append_sheet(wb,ws,('ج'+(tIdx+1)).substring(0,31));
  });
  XLSX.writeFile(wb,'الكابتن_سعيد_'+new Date().toLocaleDateString('ar-EG').replace(/\//g,'-')+'.xlsx');
  showToast('✅ تم تصدير ملف Excel ('+tablesData.length+' جداول)');
}
function exportSingleArchiveExcel(key){
  if(!window.XLSX) return;
  const item=archive[key];
  const wb=XLSX.utils.book_new();
  if(item.tables){
    item.tables.forEach((t,tIdx)=>{
      const cols=['م','عدد الحركات','أمانات','ط.شهيد','ط.شرطة','مسنين','إعاقة','ميكنة'];
      const data=[['ملف: '+key+' | '+t.name],[],cols];
      t.rows.forEach((r,i)=>{if(r.count!==''&&r.count!=null) data.push([tIdx*ROWS_PER_TABLE+i+1,r.count,r.a,r.s,r.p,r.old,r.dis,r.m]);});
      const ws=XLSX.utils.aoa_to_sheet(data);
      ws['!cols']=[{wch:5},{wch:15},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10}];
      XLSX.utils.book_append_sheet(wb,ws,('ج'+(tIdx+1)).substring(0,31));
    });
  } else {
    const rows=item.rows||item;
    const cols=['م','عدد الحركات','أمانات','ط.شهيد','ط.شرطة','مسنين','إعاقة','ميكنة'];
    const data=[['ملف: '+key+' | التاريخ: '+(item.date||'')],[],cols];
    rows.forEach((r,i)=>{if(r.count!==''&&r.count!=null) data.push([i+1,r.count,r.a,r.s,r.p,r.old,r.dis,r.m]);});
    const ws=XLSX.utils.aoa_to_sheet(data);
    ws['!cols']=[{wch:5},{wch:15},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10}];
    XLSX.utils.book_append_sheet(wb,ws,key.substring(0,31));
  }
  XLSX.writeFile(wb,key+'.xlsx');
  showToast('✅ تم تصدير ملف: '+key);
}

function openPdfModal(){openModal('pdfModal');}

function exportPDF(){

async function exportPasswordPDF(){
  const pass=document.getElementById('pdfPassInput').value.trim();
  const prog=document.getElementById('pdf-progress');
  if(!pass){prog.textContent='⚠️ أدخل كلمة السر أولاً';prog.style.color='var(--danger)';return;}
  if(!window.PDFLib){prog.textContent='⚠️ مكتبة PDF غير محملة';prog.style.color='var(--danger)';return;}
  prog.textContent='⏳ جاري إنشاء ملف PDF...';prog.style.color='var(--text-muted)';
  try{
    const {PDFDocument,rgb,StandardFonts}=PDFLib;
    const pdfDoc=await PDFDocument.create();
    const font=await pdfDoc.embedFont(StandardFonts.Helvetica);
    const fontBold=await pdfDoc.embedFont(StandardFonts.HelveticaBold);
    const cols=['#','Count','Amanat','T.Shahid','T.Shorta','Musinin','Aaqa','Mech'];
    const colW=[30,70,65,65,65,65,65,65];
    const allRows=getAllRows().filter(r=>r.count!==''&&r.count!=null);
    let page=pdfDoc.addPage([595,842]);
    const {width,height}=page.getSize();
    page.drawText('Captain Said System - Work Permits',{x:width/2-110,y:height-50,size:16,font:fontBold,color:rgb(0.12,0.25,0.69)});
    page.drawText('Date: '+new Date().toLocaleDateString('en-GB'),{x:width/2-50,y:height-75,size:11,font,color:rgb(0.28,0.35,0.45)});
    let xOff=30,yOff=height-110;
    page.drawRectangle({x:25,y:yOff-5,width:width-50,height:22,color:rgb(0.88,0.91,0.94)});
    cols.forEach((c,i)=>{page.drawText(c,{x:xOff+2,y:yOff+3,size:9,font:fontBold,color:rgb(0.1,0.1,0.1)});xOff+=colW[i];});
    yOff-=18;
    allRows.forEach((r,ri)=>{
      if(yOff<60){page=pdfDoc.addPage([595,842]);yOff=height-60;}
      if(ri%2===0) page.drawRectangle({x:25,y:yOff-4,width:width-50,height:18,color:rgb(0.97,0.98,1)});
      const vals=[ri+1,r.count,r.a,r.s,r.p,r.old,r.dis,r.m];
      xOff=30;
      vals.forEach((v,i)=>{page.drawText(String(v||''),{x:xOff+2,y:yOff,size:9,font,color:rgb(0.1,0.1,0.1)});xOff+=colW[i];});
      yOff-=16;
    });
    const pdfBytes=await pdfDoc.save({userPassword:pass,ownerPassword:pass+'_admin',permissions:{printing:'lowResolution',copying:false,modifying:false}});
    const blob=new Blob([pdfBytes],{type:'application/pdf'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='الكابتن_سعيد_'+new Date().toLocaleDateString('ar-EG').replace(/\//g,'-')+'.pdf';a.click();URL.revokeObjectURL(url);
    prog.textContent='✅ تم تصدير PDF محمي بنجاح!';prog.style.color='var(--success)';
    setTimeout(()=>{closeModal('pdfPassModal');showToast('✅ تم تصدير PDF محمي');},1500);
  } catch(err){prog.textContent='❌ خطأ: '+err.message;prog.style.color='var(--danger)';}
}

function shareData(){
  const allRows=getAllRows();
  const t=allRows.reduce((a,c)=>({a:a.a+(+c.a||0),s:a.s+(+c.s||0),p:a.p+(+c.p||0),old:a.old+(+c.old||0),dis:a.dis+(+c.dis||0),m:a.m+(+c.m||0)}),{a:0,s:0,p:0,old:0,dis:0,m:0});
  const filled=allRows.filter(r=>r.count!==''&&r.count!=null).length;
  const text='📋 منظومة الكابتن سعيد - تصاريح العمل\n📅 '+new Date().toLocaleDateString('ar-EG')+'\n\nعدد الجداول: '+tablesData.length+'\nعدد الصفوف: '+filled+'\nالأمانات: '+t.a+'\nط.شهيد: '+t.s+'\nط.شرطة: '+t.p+'\nمسنين: '+t.old+'\nإعاقة: '+t.dis+'\nميكنة: '+t.m;
  if(navigator.share){navigator.share({title:'منظومة الكابتن سعيد',text}).catch(()=>{});}
  else if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>showToast('✅ تم نسخ البيانات'));}
  else showToast('⚠️ المشاركة غير مدعومة');
}

// ============================
// BACKUP
// ============================
function exportBackup(){
  const data=JSON.stringify({tables:tablesData,archive,exported:new Date().toISOString()},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='نسخة_احتياطية_'+new Date().toLocaleDateString('ar-EG').replace(/\//g,'-')+'.json';a.click();
  showToast('✅ تم تصدير النسخة الاحتياطية');
}
function importBackup(e){
  const file=e.target.files[0];if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      showConfirm('سيتم استبدال كل البيانات الحالية بالنسخة الاحتياطية. متأكد؟',()=>{
        if(data.tables) tablesData=data.tables;
        else if(data.rows){tablesData[0].rows=data.rows;}
        if(data.archive) archive=data.archive;
        saveTablesData();save(STORE_ARCH,archive);
        drawAll();renderArchive();updateGrand();refreshTableSelect();
        showToast('✅ تم استيراد النسخة الاحتياطية بنجاح');
      });
    } catch{showToast('❌ ملف غير صالح');}
  };
  reader.readAsText(file);e.target.value='';
}

let toastTimer;

  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),3000);
}
